<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bookstore{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5; /* Trắng xám nhẹ cho 60% */
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-top: 10px solid #8B4513; /* Nâu vân gỗ cho 10% */
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #1a1a1a; /* Đen cho 30% */
        }
        
        h1 {
            color: #1a1a1a; /* Đen */
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        nav {
            margin: 20px 0;
            text-align: center;
        }
        
        nav a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background: #1a1a1a; /* Đen */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            background: #8B4513; /* Nâu vân gỗ */
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .messages {
            margin: 20px 0;
        }
        
        .message {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid;
        }
        
        .message.success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        
        .message.error {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        
        .content {
            margin-top: 30px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Bookstore Service</h1>
            <nav>
                <a href="{% url 'home' %}">🏠 Trang chủ</a>
                <a href="{% url 'register_customer' %}">✍️ Đăng ký</a>
            </nav>
        </header>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <footer>
            <p>&copy; 2026 Bookstore Service - Microservices Architecture</p>
        </footer>
    </div>
</body>
</html>
